name: SonarQube — Code Quality Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:   # déclenchement manuel depuis l'UI GitHub

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 — Tests + couverture de code
  # ──────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nammglobal
          POSTGRES_PASSWORD: nammglobal_test
          POSTGRES_DB: nammglobal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-secret-key-not-for-production
      JWT_SECRET_KEY: ci-jwt-secret-key-not-for-production
      DATABASE_URL: postgresql://nammglobal:nammglobal_test@localhost:5432/nammglobal_test
      CLOUDINARY_CLOUD_NAME: dummy
      CLOUDINARY_API_KEY: dummy
      CLOUDINARY_API_SECRET: dummy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # requis par SonarQube pour blame/history

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linter (ruff)
        run: ruff check app/ --output-format=github
        continue-on-error: true   # ne bloque pas le scan, juste un signal

      - name: Check formatting (black)
        run: black --check app/
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          if [ -d "tests" ]; then
            pytest tests/ \
              --cov=app \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              --tb=short \
              -q
          else
            echo "No tests directory found — generating empty coverage report."
            echo '<?xml version="1.0" ?><coverage version="7.0"></coverage>' > coverage.xml
          fi
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()   # upload même si pytest échoue ou si tests/ est absent
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Scan SonarQube
  # ──────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test   # attend la fin des tests pour avoir le coverage.xml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarQube a besoin de l'historique complet

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
        continue-on-error: true   # pas bloquant si pas de tests

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY || 'nammglobal-backend' }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectName="NAMM GLOBAL Backend"
            -Dsonar.sources=app
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**,**/venv/**,seed.py,all.model.py
            -Dsonar.sourceEncoding=UTF-8

      # ── Quality Gate (bloque la PR si le seuil n'est pas atteint) ──
      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
