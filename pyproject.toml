[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I"]
ignore = ["E501"]
exclude = ["venv", "migrations", "__pycache__"]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = "venv|migrations"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
