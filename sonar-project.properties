# ─────────────────────────────────────────────────────────────
# SonarQube / SonarCloud — NAMM GLOBAL Backend v2
# ─────────────────────────────────────────────────────────────

sonar.projectKey=nammglobal-backend
sonar.projectName=NAMM GLOBAL Backend
sonar.projectVersion=2.0

# Source & tests
sonar.sources=app
# sonar.tests=tests
sonar.language=py

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions (migrations, cache, seeds, config)
sonar.exclusions=\
  **/migrations/**,\
  **/__pycache__/**,\
  **/venv/**,\
  seed.py,\
  all.model.py

sonar.test.exclusions=\
  **/migrations/**,\
  **/__pycache__/**

# Coverage — généré par pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Ruff / linter reports (optionnel, si généré)
# sonar.python.ruff.reportPaths=ruff-report.json

# Duplication
sonar.cpd.python.minimumTokens=50
